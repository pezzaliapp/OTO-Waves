<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>OTO Waves v3 — Dipole Radiation</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">OTO <span>by PezzaliAPP</span></div>
      <div class="status"><span class="dot"></span> realtime field</div>
    </header>

    <section class="hero">
      <p class="kicker">La matematica che si guarda</p>
      <h1>Electromagnetic Waves</h1>
      <p class="subtitle">Dipole Radiation Lab</p>
    </section>

    <section class="formula">
      <div><b class="cyan">E</b><span>∝ 1/r · cos(kr − ωt)</span></div>
      <div><b class="gold">B</b><span>∝ 1/r · cos(kr − ωt)</span></div>
      <div><b class="violet">S</b><span>= 1/μ₀ · (E × B)</span></div>
    </section>

    <main class="stage">
      <canvas id="canvas"></canvas>
      <div class="dipole">
        <div class="axis"></div>
        <div class="charge positive"></div>
        <div class="charge negative"></div>
      </div>
    </main>

    <section class="panel">
      <div>
        <small>TIME</small>
        <strong id="time">0.00</strong>
      </div>
      <div>
        <small>FIELD</small>
        <strong><span class="cyan">E</span> <span id="e">+0.00</span></strong>
      </div>
      <div>
        <small>MAGNETIC</small>
        <strong><span class="gold">B</span> <span id="b">+0.00</span></strong>
      </div>
      <div>
        <small>ENERGY</small>
        <strong><span class="violet">S</span> <span id="s">0.000</span></strong>
      </div>
    </section>

    <section class="controls">
      <button id="play">Pausa</button>
      <button id="reset">Reset</button>
      <label>Velocità <input id="speed" type="range" min="0.25" max="2" step="0.05" value="0.75"></label>
      <label>Ampiezza <input id="amp" type="range" min="35" max="95" step="1" value="62"></label>
    </section>

    <footer>OTO Waves v3 PRO · visual physics PWA · offline ready</footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
