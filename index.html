<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020611" />
  <title>Dipole Radiation Lab</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="hero">
      <div class="eyebrow">PezzaliAPP Physics Lab</div>
      <h1>Ondas Electromagnéticas</h1>
      <p>Radiación de un Dipolo</p>
    </header>

    <section class="formula-card glass">
      <div class="formula cyan">E⃗ ∝ <span>1/r</span> cos(kr − ωt) k̂</div>
      <div class="formula yellow">B⃗ ∝ <span>1/r</span> cos(kr − ωt) φ̂</div>
      <div class="formula magenta">S⃗ = <span>1/μ₀</span> (E⃗ × B⃗)</div>
    </section>

    <main class="stage-wrap">
      <canvas id="fieldCanvas"></canvas>
      <div class="center-axis"></div>
      <div class="charge charge-top"></div>
      <div class="charge charge-bottom"></div>
      <div class="ring ring-a"></div>
      <div class="ring ring-b"></div>
    </main>

    <section class="control-panel glass">
      <div>
        <h2>PARAMETRI</h2>
        <p>t = <span id="timeValue">0.00</span></p>
      </div>
      <div>
        <h2>CAMPO (r=3)</h2>
        <p class="cyan">Eᶻ = <span id="eValue">0.00</span></p>
        <p class="yellow">Bᵩ = <span id="bValue">0.00</span></p>
      </div>
      <div>
        <h2>ENERGÍA</h2>
        <p class="magenta">|S| ∝ <span id="sValue">0.000</span></p>
      </div>
    </section>

    <section class="buttons">
      <button id="toggleBtn">Pausa</button>
      <button id="resetBtn">Reset</button>
      <label>
        Velocità
        <input id="speedRange" type="range" min="0.2" max="2.5" step="0.1" value="1">
      </label>
      <label>
        Ampiezza
        <input id="ampRange" type="range" min="35" max="110" step="1" value="72">
      </label>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
